name: MLOps CI/CD Pipeline

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI: ./mlruns

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: "Run 1: Lasso Baseline (all features, v1)"
        run: python src/train.py --run_name run1 --model_type lasso --alpha 0.1 --dataset_version v1

      - name: "Run 2: Ridge (all features, v1)"
        run: python src/train.py --run_name run2 --model_type ridge --alpha 1.0 --dataset_version v1

      - name: "Run 3: Lasso tuned (all features, v1)"
        run: python src/train.py --run_name run3 --model_type lasso --alpha 0.01 --dataset_version v1

      - name: "Run 4: RandomForest + feature selection (v2)"
        run: python src/train.py --run_name run4 --model_type random_forest --n_estimators 100 --max_depth 10 --dataset_version v2 --features selected

      - name: "Run 5: GradientBoosting + feature selection (v2)"
        run: python src/train.py --run_name run5 --model_type gradient_boosting --n_estimators 100 --max_depth 5 --dataset_version v2 --features selected

      - name: Display MLflow Metrics
        run: |
          echo "## MLflow Experiment Results" >> $GITHUB_STEP_SUMMARY
          echo "**Name:** Sricharan" >> $GITHUB_STEP_SUMMARY
          echo "**Roll No:** 2022BCS0111" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat output_metrics.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Model Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlops-artifacts
          path: |
            models/
            output_metrics.json

      - name: Build Docker Image
        run: docker build -t sricharan-mlops:latest .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true

      - name: Tag and Push Docker Image
        run: |
          docker tag sricharan-mlops:latest ${{ secrets.DOCKER_USERNAME }}/sricharan-mlops:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/sricharan-mlops:latest
        continue-on-error: true

      - name: Pipeline Summary
        run: |
          echo "## ✅ Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "- All 5 MLflow runs logged to sricharan_experiment" >> $GITHUB_STEP_SUMMARY
          echo "- Model saved to models/model.pkl" >> $GITHUB_STEP_SUMMARY
          echo "- Docker image built: sricharan-mlops:latest" >> $GITHUB_STEP_SUMMARY
